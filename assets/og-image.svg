<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0E2A36"/>
      <stop offset="55%" stop-color="#15455A"/>
      <stop offset="130%" stop-color="#2E7D8F"/>
    </linearGradient>
    <radialGradient id="glow" cx="78%" cy="32%" r="55%">
      <stop offset="0%" stop-color="#C9A24B" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#C9A24B" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- brand mark -->
  <rect x="80" y="74" width="64" height="64" rx="15" fill="#15455A" stroke="#C9A24B" stroke-width="1.5"/>
  <text x="112" y="121" font-family="Georgia, serif" font-size="42" font-weight="700" fill="#C9A24B" text-anchor="middle">L</text>
  <text x="164" y="106" font-family="Georgia, serif" font-size="30" font-weight="600" fill="#FBF9F4">Luxe</text>
  <text x="164" y="128" font-family="Arial, sans-serif" font-size="12" letter-spacing="3" fill="#C9A24B">PROPERTY MANAGEMENT</text>

  <!-- eyebrow -->
  <text x="80" y="280" font-family="Arial, sans-serif" font-size="18" letter-spacing="5" fill="#E4C77E">ADMINISTRACIÓN DE LUJO · AIRBNB · PUERTO RICO</text>

  <!-- headline -->
  <text x="78" y="360" font-family="Georgia, serif" font-size="68" font-weight="700" fill="#FBF9F4">Tu Propiedad en las</text>
  <text x="78" y="438" font-family="Georgia, serif" font-size="68" font-weight="700" font-style="italic" fill="#E4C77E">Mejores Manos.</text>

  <!-- subline -->
  <text x="80" y="500" font-family="Arial, sans-serif" font-size="24" fill="#D8D0C2">Administración profesional de Airbnb que maximiza tus ingresos sin estrés.</text>

  <!-- stat chips -->
  <text x="80" y="572" font-family="Georgia, serif" font-size="34" font-weight="700" fill="#E4C77E">+38%</text>
  <text x="80" y="596" font-family="Arial, sans-serif" font-size="14" fill="#D8D0C2">Ingresos</text>
  <text x="230" y="572" font-family="Georgia, serif" font-size="34" font-weight="700" fill="#E4C77E">94%</text>
  <text x="230" y="596" font-family="Arial, sans-serif" font-size="14" fill="#D8D0C2">Ocupación</text>
  <text x="390" y="572" font-family="Georgia, serif" font-size="34" font-weight="700" fill="#E4C77E">4.9</text>
  <path d="M 455 548 l 4.7 9.5 10.5 1.5 -7.6 7.4 1.8 10.4 -9.4 -4.9 -9.4 4.9 1.8 -10.4 -7.6 -7.4 10.5 -1.5 z" fill="#E4C77E"/>
  <text x="390" y="596" font-family="Arial, sans-serif" font-size="14" fill="#D8D0C2">Reseñas</text>

  <line x1="80" y1="200" x2="240" y2="200" stroke="#C9A24B" stroke-width="2"/>
</svg>
